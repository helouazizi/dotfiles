---
- name: Download and dearmor HashiCorp GPG key safely
  shell: |
    set -o pipefail
    curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true

- name: Add HashiCorp Repository using legacy-safe syntax
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com noble main"
    state: present
    filename: hashicorp
  become: true

- name: Install Terraform CLI
  apt:
    name: terraform
    state: present
    update_cache: yes
  become: true

- name: Check if AWS CLI v2 is already installed
  command: aws --version
  register: aws_check
  ignore_errors: true
  changed_when: false

- name: Download and execute official AWS CLI v2 standalone installer
  block:
    - name: Download AWS CLI v2 installation archive
      get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
        dest: "/tmp/awscliv2.zip"
        mode: '0644'

    - name: Extract AWS CLI v2 package bundle
      unarchive:
        src: "/tmp/awscliv2.zip"
        dest: "/tmp"
        remote_src: yes

    - name: Run official installation script
      command: "/tmp/aws/install"
      become: true

    - name: Clean up temporary installation assets
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/awscliv2.zip"
        - "/tmp/aws"
  when: aws_check.rc != 0